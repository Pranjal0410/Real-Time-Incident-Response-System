events {
    worker_connections 1024;
}

http {

    # ─────────────────────────────────────────
    # UPSTREAM — Backend Servers
    # ip_hash ensures same user → same server
    # IMPORTANT for WebSocket/Socket.io!
    # Without ip_hash, Socket.io connection
    # breaks because load balancer switches servers
    # ─────────────────────────────────────────
    upstream incident_backend {
        ip_hash;                    # Sticky sessions for WebSocket
        server localhost:3001;      # Server 1
        server localhost:3002;      # Server 2
    }

    server {
        listen 8080;               # Load balancer port

        # ─────────────────────────────────────
        # Socket.io specific location
        # Socket.io uses /socket.io/ path
        # Needs special WebSocket upgrade headers
        # ─────────────────────────────────────
        location /socket.io/ {
            proxy_pass http://incident_backend;

            # WebSocket upgrade — ZAROORI hai!
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Client ka real IP pass karo
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket timeout — long-lived connections ke liye
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ─────────────────────────────────────
        # REST API requests
        # Normal HTTP proxy pass
        # ─────────────────────────────────────
        location / {
            proxy_pass http://incident_backend;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # CORS headers (agar frontend alag domain pe ho)
            proxy_set_header Origin $http_origin;
        }
    }
}